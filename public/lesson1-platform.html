    <script>
        (() => {
            function applyFrameTheme(mode) {
                const next = mode || localStorage.getItem('theme-mode') || 'system';
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const active = next === 'system' ? (systemDark ? 'dark' : 'light') : next;
                document.documentElement.classList.toggle('dark', active === 'dark');
            }
            applyFrameTheme();
            window.addEventListener('storage', (event) => {
                if (event.key !== 'theme-mode') return;
                applyFrameTheme(event.newValue || 'system');
            });
            window.addEventListener('message', (event) => {
                if (event.origin !== window.location.origin || event.data?.type !== 'theme-mode') return;
                applyFrameTheme(event.data.mode);
            });
        })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {};
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.warn("使用本地離線模式運行");

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'german-brick-pro-v3';

        let app, auth, db;
        try {

                auth = getAuth(app);
                db = getFirestore(app);

        } catch (e) {

        const defaultDatabase = [
            { article: "der", word: "Apfel", plural: "die Äpfel", meaning: "蘋果", example: "Ein Kilo Äpfel bitte.", category: "🍎 飲食與採買", errors: 0, starred: false },

            { article: "das", word: "Brot", plural: "die Brote", meaning: "麵包", example: "Das Brot ist sehr frisch.", category: "🍎 飲食與採買", errors: 0, starred: false },

            { article: "die", word: "Milch", plural: "-", meaning: "牛奶", example: "Ich kaufe Milch im Supermarkt.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "das", word: "Ei", plural: "die Eier", meaning: "蛋", example: "Das Ei ist frisch.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "der", word: "Markt", plural: "die Märkte", meaning: "市場", example: "Der Markt ist heute sehr voll.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "die", word: "Flasche", plural: "die Flaschen", meaning: "瓶子", example: "Die Flasche ist aus Glas.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "das", word: "Gemüse", plural: "-", meaning: "蔬菜", example: "Gemüse ist gesund.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "der", word: "Saft", plural: "die Säfte", meaning: "果汁", example: "Der Saft ist süß.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "die", word: "Wurst", plural: "die Würste", meaning: "香腸", example: "Die Wurst ist lecker.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "das", word: "Wasser", plural: "-", meaning: "水", example: "Ich trinke viel Wasser.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "der", word: "Tee", plural: "die Tees", meaning: "茶", example: "Der Tee ist heiß.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "die", word: "Butter", plural: "-", meaning: "奶油", example: "Die Butter ist im Kühlschrank.", category: "🍎 飲食與採買", errors: 0, starred: false },
            { article: "das", word: "Obst", plural: "-", meaning: "水果", example: "Obst ist gesund.", category: "🍎 飲食與採買", errors: 0, starred: false }
        ];

        window.wordDatabase = [];
        window.userStats = { streak: 0, lastDate: null, history: {}, voices: { rate: 0.9, pitch: 1.0, selectedURI: null } };
        window.currentMode = 'learn';
        window.currentCategory = '';
        window.filteredWords = [];
        window.currentIndex = 0;
        window.isFlipped = false;
        window.voices = [];
        window.user = null;
        window.presetVocabularyLists = [];
        window.preferredPresetVocabularyId = 'schritte-b1-1';

        const posLabels = {
            noun: '名詞',
            verb: '動詞',
            adjective: '形容詞',
            adverb: '副詞',
            connector: '連接詞',
            'adverb/connector': '副詞/連接詞',
            preposition: '介系詞',
            phrase: '片語',
            other: '其他'
        };

        function getPosLabel(pos) {
            return posLabels[pos] || '其他';
        }

        function inferPos(item) {
            const raw = String(item.pos || '').trim().toLowerCase();
            if (raw) return raw;
            return ['der', 'die', 'das'].includes(String(item.article || '').trim().toLowerCase()) ? 'noun' : 'other';
        }

        function isNoun(item) {
            return item.pos === 'noun' && ['der', 'die', 'das'].includes(item.article);
        }

        function escapeHtml(value = '') {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderPracticePanel(word) {
            const panel = document.getElementById('word-practice-panel');
            if (!panel) return;

            const p = word.practice || {};
            const pos = word.pos || p.type || 'other';
            const rows = [];

            if (pos === 'noun' || p.type === 'noun') {
                rows.push(['冠詞', word.article || p.article || '-']);
                rows.push(['複數', word.plural || p.plural || '-']);
                if (p.practicePromptZh) rows.push(['練習', p.practicePromptZh]);
            } else if (pos === 'verb' || pos === 'phrase' || p.type === 'verb') {
                if (p.auxiliary) rows.push(['助動詞', p.auxiliary]);
                if (p.praeteritum_3sg) rows.push(['Präteritum', p.praeteritum_3sg]);
                if (p.perfekt_3sg) rows.push(['Perfekt', p.perfekt_3sg]);
                if (p.pattern) rows.push(['句型', p.pattern]);
                if (p.usageNoteZh) rows.push(['提示', p.usageNoteZh]);
                if (p.present) {
                    const present = ['ich', 'du', 'er/sie/es', 'wir', 'ihr', 'sie/Sie']
                        .map((key) => p.present[key])
                        .filter(Boolean)
                        .join(' · ');
                    if (present) rows.push(['現在式', present]);
                }
            } else if (pos === 'adverb/connector' || pos === 'adverb' || pos === 'connector' || pos === 'preposition' || p.type === 'function-word') {
                if (p.subtype) rows.push(['類型', p.subtype]);
                if (p.case) rows.push(['格位', p.case]);
                if (p.sentencePosition) rows.push(['位置', p.sentencePosition]);
                if (p.pattern) rows.push(['句型', p.pattern]);
                if (p.usageNoteZh) rows.push(['提示', p.usageNoteZh]);
                if (p.practicePromptZh) rows.push(['練習', p.practicePromptZh]);
            } else if (pos === 'adjective' || p.type === 'adjective') {
                if (p.examplePattern) rows.push(['句型', p.examplePattern]);
                if (p.usageNoteZh) rows.push(['提示', p.usageNoteZh]);
                if (p.practicePromptZh) rows.push(['練習', p.practicePromptZh]);
            } else if (p.practicePromptZh || p.usageNoteZh || p.pattern) {
                if (p.pattern) rows.push(['句型', p.pattern]);
                if (p.usageNoteZh) rows.push(['提示', p.usageNoteZh]);
                if (p.practicePromptZh) rows.push(['練習', p.practicePromptZh]);
            }

            if (rows.length === 0) {
                panel.className = 'hidden';
                panel.innerHTML = '';
                return;
            }

            panel.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
            panel.innerHTML = rows.map(([label, value]) => {
                const text = String(value || '');
                const isLong = text.length > 38 || ['現在式', '提示', '練習', '位置'].includes(label);
                return `
                    <section class="${isLong ? 'sm:col-span-2' : ''} rounded-2xl border border-slate-100 bg-white/90 p-3.5 shadow-sm">
                        <div class="mb-1.5 text-[11px] font-black uppercase text-slate-400">${escapeHtml(label)}</div>
                        <div class="fit-word text-sm sm:text-base font-black leading-relaxed text-slate-700">${escapeHtml(text)}</div>
                    </section>
                `;
            }).join('');
        }

        async function init() {
            setupVoices();
            await setupPresetVocabulary();
            loadLocalData();

            if (auth) {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Auth Fail", e);
                }

                onAuthStateChanged(auth, (u) => {
                    window.user = u;
                    if (u) {
                        updateCloudStatusUI(true);
                        setupCloudSync(u.uid);
                    } else {
                        updateCloudStatusUI(false);
                    }
                });
            } else {
                updateCloudStatusUI(false);
            }

            setMode('learn');
        }

        function loadLocalData() {
            const d = localStorage.getItem('deutschLernkartenDB_vPro');
            const s = localStorage.getItem('deutschLernkartenStats');
            window.wordDatabase = normalizeWordList(d ? JSON.parse(d) : defaultDatabase);
            if (s) window.userStats = JSON.parse(s);
            refreshUI();
            autoUpgradeDefaultVocabulary();
        }

        function isLegacyDefaultDatabase(words) {
            if (!Array.isArray(words) || words.length !== defaultDatabase.length) return false;
            const defaultKeys = new Set(defaultDatabase.map((item) => `${item.article}:${item.word}`));
            return words.every((item) => defaultKeys.has(`${item.article}:${item.word}`));
        }

        function isBasicSchritteDatabase(words) {
            if (!Array.isArray(words) || words.length !== 352) return false;
            const looksLikeSchritte = words.some((item) =>
                item?.id === 'b1_1_l01_w001' ||
                item?.source === 'Schritte International Neu 5 B1.1'
            );
            const hasEnhancedPractice = words.some((item) => item?.practice || item?.exampleZh);
            return looksLikeSchritte && !hasEnhancedPractice;
        }

        async function autoUpgradeDefaultVocabulary() {
            if (!isLegacyDefaultDatabase(window.wordDatabase) && !isBasicSchritteDatabase(window.wordDatabase)) return;
            const preset = window.presetVocabularyLists.find((item) => item.id === window.preferredPresetVocabularyId);
            if (!preset) return;

            try {
                const res = await fetch(preset.path);
                if (!res.ok) throw new Error(`Failed to load ${preset.path}`);
                const words = normalizeWordList(await res.json());
                if (words.length === 0) return;
                window.wordDatabase = words;
                localStorage.setItem('deutschLernkartenDB_vPro', JSON.stringify(window.wordDatabase));
                refreshUI();
                window.showToast(`✅ 已自動更新為「${preset.label}」${words.length} 個單字`);
                window.saveDatabaseToCloud();
            } catch (error) {
                console.error(error);
            }
        }

        function normalizeWordList(items) {
            if (items && !Array.isArray(items) && Array.isArray(items.lessons)) {
                items = items.lessons.flatMap((lesson) =>
                    (lesson.vocabulary || []).map((item) => ({
                        ...item,
                        meaning: item.meaning || item.translationZh,
                        example: item.example || item.exampleDe,
                        exampleZh: item.exampleZh || item.exampleTranslationZh,
                        practice: item.practice,
                        category: item.category || lesson.lessonTag || `Lektion ${lesson.lesson || ''}｜${lesson.title || ''}`.trim(),
                        lesson: lesson.lesson || item.lesson || null,
                        lessonTitle: lesson.title || item.lessonTitle || ''
                    }))
                );
            }

            if (items && !Array.isArray(items)) {
                items = items.vocabulary || items.words || [];
            }

            if (!Array.isArray(items)) return [];

            return items
                .map((item) => {
                    const article = String(item.article || '').trim().toLowerCase();
                    const pos = inferPos(item);
                    return {
                        id: String(item.id || '').trim(),
                        article,
                        word: String(item.word || '').trim(),
                        plural: String(item.plural || '-').trim() || '-',
                        meaning: String(item.meaning || item.translationZh || '').trim(),
                        example: String(item.example || item.exampleDe || '').trim(),
                        exampleZh: String(item.exampleZh || item.exampleTranslationZh || '').trim(),
                        practice: item.practice && typeof item.practice === 'object' ? item.practice : null,
                        category: String(item.category || item.lessonTag || '未分類').trim(),
                        pos,
                        lesson: item.lesson || null,
                        lessonTitle: item.lessonTitle || '',
                        source: item.source || '',
                        errors: Number(item.errors || 0),
                        starred: Boolean(item.starred)
                    };
                })
                .filter((item) =>
                    item.word &&
                    item.meaning
                );
        }

        function parseWordListContent(content) {
            const trimmed = content.trim();
            if (!trimmed) return [];

            if (trimmed.startsWith('[')) {
                return normalizeWordList(JSON.parse(trimmed));
            }

            if (trimmed.startsWith('{')) {
                const parsed = JSON.parse(trimmed);
                if (Array.isArray(parsed.lessons)) {
                    return normalizeWordList(parsed.lessons.flatMap((lesson) =>
                        (lesson.vocabulary || []).map((item) => ({
                            ...item,
                            meaning: item.meaning || item.translationZh,
                            example: item.example || item.exampleDe,
                            exampleZh: item.exampleZh || item.exampleTranslationZh,
                            practice: item.practice,
                            category: item.category || lesson.lessonTag || `Lektion ${lesson.lesson || ''}｜${lesson.title || ''}`.trim(),
                            lesson: lesson.lesson || item.lesson || null,
                            lessonTitle: lesson.title || item.lessonTitle || ''
                        }))
                    ));
                }
                return normalizeWordList(parsed.vocabulary || parsed.words || []);
            }

            const lines = trimmed.split('\n');
            const newDB = [];
            for (let line of lines) {
                line = line.trim();
                if (!line || (line.includes("詞性") && line.includes("單字"))) continue;
                const sep = line.includes('\t') ? '\t' : ',';
                const parts = line.split(sep).map(s => s.trim());
                if (parts.length >= 6) {
                    const category = parts.pop();
                    const article = parts.shift().toLowerCase();
                    const word = parts.shift();
                    const plural = parts.shift();
                    const meaning = parts.shift();
                    const example = parts.join(sep);
                    newDB.push({ article, word, plural, meaning, example, category, errors: 0, starred: false });
                }
            }
            return normalizeWordList(newDB);
        }

        function applyWordList(wordList, message) {
            const normalized = normalizeWordList(wordList);
            if (normalized.length === 0) {
                window.showToast('⚠️ 字庫格式不正確或沒有有效單字', true);
                return;
            }

            window.wordDatabase = normalized;
            localStorage.setItem('deutschLernkartenDB_vPro', JSON.stringify(window.wordDatabase));
            window.saveDatabaseToCloud();
            window.showToast(message || `✅ 已載入 ${normalized.length} 個單字`);
            refreshUI();
        }

        async function setupPresetVocabulary() {
            const select = document.getElementById('preset-vocab-select');
            const description = document.getElementById('preset-vocab-description');
            if (!select) return;

            try {
                const res = await fetch('/vocab/index.json');
                if (!res.ok) throw new Error('preset index not found');
                window.presetVocabularyLists = await res.json();

                select.innerHTML = window.presetVocabularyLists
                    .map((item) => `<option value="${item.id}">${item.label} (${item.count} 個)</option>`)
                    .join('');

                const preferred = window.presetVocabularyLists.find((item) => item.id === window.preferredPresetVocabularyId);
                const first = preferred || window.presetVocabularyLists[0];
                if (first) select.value = first.id;
                if (description && first) description.innerText = first.description;

                select.addEventListener('change', () => {
                    const selected = window.presetVocabularyLists.find((item) => item.id === select.value);
                    if (description && selected) description.innerText = selected.description;
                });
            } catch (error) {
                console.error(error);
                select.innerHTML = '<option value="">目前沒有可用的內建字庫</option>';
            }
        }

        window.loadPresetVocabulary = async function() {
            const select = document.getElementById('preset-vocab-select');
            const selected = window.presetVocabularyLists.find((item) => item.id === select?.value);
            if (!selected) {
                window.showToast('⚠️ 請先選擇字庫', true);
                return;
            }

            try {
                const res = await fetch(selected.path);
                if (!res.ok) throw new Error(`Failed to load ${selected.path}`);
                const words = await res.json();
                const normalized = normalizeWordList(words);
                applyWordList(normalized, `✅ 已載入「${selected.label}」${normalized.length} 個單字`);
            } catch (error) {
                console.error(error);
                window.showToast('⚠️ 載入內建字庫失敗', true);
            }
        };

                if (snap.exists()) {
                    const data = snap.data();
                    if (data.wordDatabase?.length > 0) {
                        window.wordDatabase = normalizeWordList(data.wordDatabase);
                        window.userStats = data.userStats || window.userStats;
                        localStorage.setItem('deutschLernkartenDB_vPro', JSON.stringify(window.wordDatabase));
                        localStorage.setItem('deutschLernkartenStats', JSON.stringify(window.userStats));

            const icon = document.getElementById('cloud-status-icon');

        function setupCategories() {
            let cats = [];
            if (window.wordDatabase.some(w => (w.errors || 0) > 0)) cats.unshift("⚠️ 錯誤紀錄");
            if (window.wordDatabase.some(w => w.starred)) cats.unshift("⭐ 已收藏");
            cats.push("🗂️ 全部單字");
            const posCats = [...new Set(window.wordDatabase.map(w => w.pos))]
                .filter(Boolean)
                .map(pos => `詞性｜${getPosLabel(pos)}`);
            cats.push(...posCats);
            cats.push(...[...new Set(window.wordDatabase.map(w => w.category))]);
            window.categories = cats;
            if (!window.currentCategory || !cats.includes(window.currentCategory)) window.currentCategory = cats[0] || '';
            window.setCategory(window.currentCategory, false);
        }

        function getWordsForCategory(cat) {
            if (cat === "🗂️ 全部單字") {
                return [...window.wordDatabase];
            }
            if (cat === "⚠️ 錯誤紀錄") {
                return window.wordDatabase.filter(w => (w.errors || 0) > 0).sort((a, b) => b.errors - a.errors);
            }
            if (cat === "⭐ 已收藏") {
                return window.wordDatabase.filter(w => w.starred);
            }
            if (cat?.startsWith("詞性｜")) {
                const label = cat.replace("詞性｜", "");
                return window.wordDatabase.filter(w => getPosLabel(w.pos) === label);
            }
            return window.wordDatabase.filter(w => w.category === cat);
        }

        window.setCategory = function(cat, refresh = true) {
            window.currentCategory = cat;
            const textEl = document.getElementById('current-category-text');
            if (textEl) textEl.innerText = cat || '無單字';

            const baseWords = getWordsForCategory(cat);
            window.filteredWords = baseWords.filter(w => window.currentMode === 'quiz' ? isNoun(w) : true);
            if (!cat.includes("⚠️") && !cat.includes("⭐")) {
                window.filteredWords.sort(() => Math.random() - 0.5);
            }

            window.currentIndex = 0;
            if (refresh) {
                window.renderVerbList();
                updateUI();
                window.closeCategoryModal();
            }
        };

        function updateUI() {
            const count = window.filteredWords.length;
            const progEl = document.getElementById('progress-text');
            const cardProgEl = document.getElementById('card-progress-pill');
            if (progEl) progEl.innerText = count > 0 ? `${window.currentIndex + 1} / ${count}` : '0 / 0';
            if (cardProgEl) cardProgEl.innerText = count > 0 ? `${window.currentIndex + 1} / ${count}` : '0 / 0';

            updateCategoryBadge();

            if (count === 0) {
                if (window.currentMode === 'learn') {
                    document.getElementById('word-main').innerText = "沒有可練習的單字";
                } else if (window.currentMode === 'quiz') {
                    document.getElementById('quiz-word').innerText = "此範圍沒有名詞";
                    document.getElementById('quiz-meaning').innerText = "請切換到包含 der / die / das 的分類";
                } else if (window.currentMode === 'pos') {
                    document.getElementById('pos-word').innerText = "沒有可練習的單字";
                    document.getElementById('pos-meaning').innerText = "";
                }
                return;
            }

            const w = window.filteredWords[window.currentIndex];
            const art = ['der','die','das'].includes(w.article) ? w.article : 'das';

            if (window.currentMode === 'learn') {
                document.getElementById('card-front').className = `card-front mobile-card-face border-2 flex flex-col items-center p-6 md:p-8 text-center transition-colors theme-${art}-bg theme-${art}-border overflow-hidden`;
                document.getElementById('word-article-badge').innerText = isNoun(w) ? w.article : getPosLabel(w.pos);
                document.getElementById('word-article-badge').className = `px-4 py-1.5 rounded-full text-white font-black text-sm uppercase mb-6 theme-${art}-badge`;
                document.getElementById('word-main').innerText = w.word;
                document.getElementById('word-back-title').innerText = w.word;
                document.getElementById('word-meaning').innerText = w.meaning;
                document.getElementById('word-plural').innerText = isNoun(w)
                    ? `複數: ${w.plural || '-'}`
                    : `詞性: ${getPosLabel(w.pos)}`;
                document.getElementById('word-example').innerText = w.example || '';
                document.getElementById('word-example-zh').innerText = w.exampleZh || '';
                document.getElementById('word-example-panel').classList.toggle('hidden', !w.example);
                renderPracticePanel(w);
                updateStarUI();
            } else if (window.currentMode === 'quiz') {
                document.getElementById('quiz-word').innerText = w.word;
                document.getElementById('quiz-meaning').innerText = w.meaning;
                resetFeedback('quiz');
            } else if (window.currentMode === 'pos') {
                document.getElementById('pos-word').innerText = w.word;
                document.getElementById('pos-meaning').innerText = w.meaning;
                resetFeedback('pos');
            } else if (window.currentMode === 'spell') {
                document.getElementById('spell-meaning').innerText = w.meaning;
                document.getElementById('spell-article').innerText = isNoun(w) ? w.article : getPosLabel(w.pos);

        window.handleFileImport = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                try {
                    const newDB = parseWordListContent(evt.target.result);
                    applyWordList(newDB, `✅ 成功匯入 ${newDB.length} 個單字`);
                } catch (error) {
                    console.error(error);
                    window.showToast('⚠️ 匯入失敗，請檢查檔案格式', true);
                }
                e.target.value = "";

            if (!window.speechSynthesis) return;
            const load = () => {
                window.voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('de'));
                const select = document.getElementById('voice-select');
                if (select && select.options.length === 0) {
                    select.innerHTML = window.voices.map(v => `<option value="${v.voiceURI}">${v.name}</option>`).join('');
                    if (window.userStats.voices?.selectedURI) select.value = window.userStats.voices.selectedURI;
                }

            load();

        window.playAudio = function(e, text) {
            if (e) e.stopPropagation();
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'de-DE';
            ut.rate = window.userStats.voices?.rate || 0.9;
            ut.pitch = window.userStats.voices?.pitch || 1.0;
            const sel = window.voices.find(v => v.voiceURI === document.getElementById('voice-select')?.value);
            if (sel) ut.voice = sel;
            window.speechSynthesis.speak(ut);
        };

            setTimeout(() => {
                t.classList.remove('opacity-0','translate-y-[-20px]');

            }, 10);
            setTimeout(() => {
                t.classList.remove('opacity-100','translate-y-0');
                t.classList.add('opacity-0','translate-y-[-20px]');
                setTimeout(() => t.style.display = 'none', 300);
            }, 3000);
        };

        window.openConfirm = function() {
            document.getElementById('confirm-modal').classList.add('flex');
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirm = function() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
        };

        window.executeRestore = async function() {
            window.wordDatabase = normalizeWordList(defaultDatabase);
            window.userStats = { streak: 0, lastDate: null, history: {}, voices: { rate: 0.9, pitch: 1.0, selectedURI: null } };
            await window.saveDatabaseToCloud();
            localStorage.removeItem('deutschLernkartenDB_vPro');
            localStorage.removeItem('deutschLernkartenStats');
            location.reload();
        };

        window.exportToFile = function() {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([JSON.stringify(window.wordDatabase, null, 2)], { type: "application/json" }));
            a.download = `德語磚家備份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
